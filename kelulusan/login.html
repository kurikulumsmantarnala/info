<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Pengumuman Kelulusan</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* CSS ASLI DARI INDEX.HTML */
    html, body { height: 100%; margin: 0; }
    .font-heading { font-family: 'Playfair Display', serif; }
    .font-body { font-family: 'Plus Jakarta Sans', sans-serif; }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .login-bg { background: linear-gradient(135deg, #0c1445 0%, #1a237e 30%, #0d47a1 60%, #01579b 100%); background-size: 300% 300%; animation: gradientMove 8s ease infinite; }
    .gold-text { background: linear-gradient(135deg, #b8860b, #ffd700, #daa520, #ffd700, #b8860b); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: shimmer 3s linear infinite; }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    .glass-card { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.12); }
    .input-field { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); transition: all 0.3s; color: white; }
    .input-field:focus { border-color: #ffd700; outline: none; }
    .btn-gold { background: linear-gradient(135deg, #b8860b, #daa520, #ffd700); color: #0c1445; font-weight: 700; transition: all 0.3s; }
    .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0.4; }
  </style>
</head>
<body class="h-full font-body">
  <div class="login-bg w-full h-full flex items-center justify-center p-4 relative overflow-hidden">
    <div id="starsBg" class="absolute inset-0 pointer-events-none"></div>
    <div class="glass-card rounded-2xl p-8 md:p-10 w-full max-w-md relative z-10 animate-scale-in">
      <div class="flex justify-center mb-5">
        <img src="https://kurikulumsmantarnala.github.io/info/smantar.png" alt="Logo" class="w-24 h-24 object-contain">
      </div>
      <h1 class="font-heading text-center text-xl md:text-2xl font-bold gold-text mb-1">PENGUMUMAN KELULUSAN</h1>
      <p class="text-center text-sm text-blue-200 mb-6">SMA Negeri Taruna Nala Jawa Timur</p>
      
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-blue-200 mb-1.5 uppercase">NISN (Username)</label>
          <input type="text" id="nisn" placeholder="Masukkan NISN" class="input-field w-full px-4 py-3 rounded-xl text-sm" required>
        </div>
        <div>
          <label class="block text-xs font-semibold text-blue-200 mb-1.5 uppercase">Tanggal Lahir</label>
          <input type="date" id="password" class="input-field w-full px-4 py-3 rounded-xl text-sm" required>
        </div>
        <button type="submit" id="loginBtn" class="btn-gold w-full py-3 rounded-xl text-sm flex items-center justify-center gap-2">
          <i data-lucide="log-in" class="w-4 h-4"></i> <span>Cek Kelulusan</span>
        </button>
      </form>
      <div id="errorMsg" class="hidden mt-4 bg-red-500/20 border border-red-400/30 text-red-200 text-xs text-center p-3 rounded-xl"></div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyduJNrjTir1yAsElCSPA38_lQJ1NwQzL53kicW6ZCFCLdT6ewOxq17_jHvX6P-jFbqLw/exec";
    let students = [];

    async function loadData() {
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      try {
        const response = await fetch(SCRIPT_URL);
        students = await response.json();
      } catch (e) { console.error("Error load data"); }
      btn.disabled = false;
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const nisnInput = document.getElementById('nisn').value.trim();
      const dateInput = document.getElementById('password').value;

      const student = students.find(s => {
        const dbNisn = s.nisn ? s.nisn.toString().trim() : "";
        let dbDate = "";
        if (s.tglLahir) {
          const d = new Date(s.tglLahir);
          dbDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }
        return dbNisn === nisnInput && dbDate === dateInput;
      });

      if (student) {
        localStorage.setItem('studentSession', JSON.stringify(student));
        window.location.href = "result.html";
      } else {
        const err = document.getElementById('errorMsg');
        err.textContent = "Data tidak ditemukan. Cek kembali NISN dan Tanggal Lahir.";
        err.classList.remove('hidden');
      }
    });

    function createStars() {
      const bg = document.getElementById('starsBg');
      for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
        bg.appendChild(star);
      }
    }

    loadData();
    createStars();
    lucide.createIcons();
  </script>
</body>
</html>
