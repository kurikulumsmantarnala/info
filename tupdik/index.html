  <script>
    // ========== ELEMENT SDK ==========
    window.elementSdk = {
      config: {},
      init(element) {
        this.config = { ...element.defaultConfig };
        this._element = element;
        element.onConfigChange(this.config);
      },
      async setConfig(partialConfig) {
        Object.assign(this.config, partialConfig);
        if (this._element && this._element.onConfigChange) {
          await this._element.onConfigChange(this.config);
        }
      }
    };

    // ========== DATA SDK ==========
    window.dataSdk = {
      _handler: null,
      _data: [],
      _isInitialized: false,
      
      async init(handler) {
        this._handler = handler;
        this._isInitialized = true;
        // Load existing data from localStorage
        try {
          const stored = localStorage.getItem('__canva_data_store__');
          if (stored) {
            this._data = JSON.parse(stored);
          }
        } catch (e) {
          console.error('Failed to load data from storage:', e);
        }
        // Notify handler of initial data
        if (this._handler && this._handler.onDataChanged) {
          this._handler.onDataChanged([...this._data]);
        }
        return { isOk: true, isError: false, data: undefined };
      },

      async create(record) {
        if (!this._isInitialized) {
          return { isOk: false, isError: true, error: new Error('Data SDK not initialized') };
        }
        try {
          const backendId = 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
          const newRecord = { ...record, __backendId: backendId };
          this._data.push(newRecord);
          this._persistData();
          if (this._handler && this._handler.onDataChanged) {
            this._handler.onDataChanged([...this._data]);
          }
          return { isOk: true, isError: false, data: undefined };
        } catch (e) {
          return { isOk: false, isError: true, error: e };
        }
      },

      async update(record) {
        if (!this._isInitialized) {
          return { isOk: false, isError: true, error: new Error('Data SDK not initialized') };
        }
        try {
          const idx = this._data.findIndex(r => r.__backendId === record.__backendId);
          if (idx === -1) {
            return { isOk: false, isError: true, error: new Error('Record not found') };
          }
          this._data[idx] = { ...record };
          this._persistData();
          if (this._handler && this._handler.onDataChanged) {
            this._handler.onDataChanged([...this._data]);
          }
          return { isOk: true, isError: false, data: undefined };
        } catch (e) {
          return { isOk: false, isError: true, error: e };
        }
      },

      async delete(record) {
        if (!this._isInitialized) {
          return { isOk: false, isError: true, error: new Error('Data SDK not initialized') };
        }
        try {
          const idx = this._data.findIndex(r => r.__backendId === record.__backendId);
          if (idx === -1) {
            return { isOk: false, isError: true, error: new Error('Record not found') };
          }
          this._data.splice(idx, 1);
          this._persistData();
          if (this._handler && this._handler.onDataChanged) {
            this._handler.onDataChanged([...this._data]);
          }
          return { isOk: true, isError: false, data: undefined };
        } catch (e) {
          return { isOk: false, isError: true, error: e };
        }
      },

      _persistData() {
        try {
          localStorage.setItem('__canva_data_store__', JSON.stringify(this._data));
        } catch (e) {
          console.error('Failed to persist data:', e);
        }
      }
    };
  </script>

      btn.textContent = 'Kirim Formulir';
      btn.disabled = false;
      btn.classList.remove('opacity-60');
    });
